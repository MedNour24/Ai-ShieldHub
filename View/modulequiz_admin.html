<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Questions</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css"
    />
    <style>
      /* --- CLEAN LAYOUT FOR IFRAME --- */
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #1a2035; /* Match Dashboard Background */
        color: #e2e8f0;
        padding: 20px;
      }

      /* --- COMPONENTS --- */
      .header {
        background: #1e293b; border: 1px solid #334155; border-radius: 10px;
        padding: 20px 25px; margin-bottom: 25px;
      }
      .header h1 { font-size: 22px; color: #f1f5f9; margin-bottom: 5px; }
      .header p { font-size: 13px; color: #94a3b8; margin: 0; }

      .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
      .stat-card { background: #1e293b; border: 1px solid #334155; padding: 15px; border-radius: 8px; text-align: center; }
      .stat-card .stat-value { font-size: 28px; font-weight: 700; color: #3b82f6; margin-bottom: 5px; }
      .stat-card .stat-label { font-size: 12px; color: #94a3b8; text-transform: uppercase; }

      .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 0; }
      .tab-btn { padding: 10px 20px; background: transparent; border: none; color: #94a3b8; cursor: pointer; font-size: 14px; border-bottom: 2px solid transparent; }
      .tab-btn.active { color: #3b82f6; border-bottom-color: #3b82f6; }
      .tab-content { display: none; }
      .tab-content.active { display: block; }

      .card { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 25px; margin-bottom: 20px; }
      .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #334155; }
      .card-header h3 { font-size: 16px; font-weight: 600; color: #f1f5f9; }
      .card-header i { color: #3b82f6; font-size: 18px; }

      .form-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 15px; }
      .form-group { margin-bottom: 15px; }
      .form-group.full { grid-column: 1 / -1; }
      .form-group label { display: block; font-size: 13px; color: #cbd5e1; margin-bottom: 6px; }
      .form-control { width: 100%; padding: 10px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; }
      .form-control:focus { outline: none; border-color: #3b82f6; }
      
      .btn { padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
      .btn-primary { background: #3b82f6; color: white; }
      .btn-secondary { background: #475569; color: #e2e8f0; }
      .btn-danger { background: #ef4444; color: white; }
      .btn-sm { padding: 5px 10px; font-size: 12px; }

      .table-container { overflow-x: auto; }
      table { width: 100%; border-collapse: collapse; font-size: 14px; }
      thead { background: #0f172a; border-bottom: 2px solid #334155; }
      th { padding: 10px; text-align: left; color: #94a3b8; font-size: 12px; text-transform: uppercase; }
      td { padding: 10px; border-bottom: 1px solid #334155; color: #cbd5e1; }
      
      .badge { padding: 3px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
      .badge-success { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
      .badge-info { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
      .badge-warning { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
      .option-tag { display: inline-block; padding: 2px 6px; background: #0f172a; border: 1px solid #334155; border-radius: 4px; margin-right: 4px; font-size: 11px; }
      .option-tag.correct { border-color: #22c55e; color: #22c55e; }

      .alert { padding: 10px; margin-bottom: 15px; border-radius: 6px; display: none; }
      .alert-success { background: rgba(34, 197, 94, 0.1); border: 1px solid #22c55e; color: #22c55e; }
      .alert-error { background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; color: #ef4444; }
      
      @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="header">
      <div>
        <h1><i class="fas fa-question-circle"></i> Questions & Results</h1>
        <p>Manage questions linked to quizzes and view results</p>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="totalQuestions">0</div>
        <div class="stat-label">Questions</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="totalResults">0</div>
        <div class="stat-label">Results</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="avgScore">0%</div>
        <div class="stat-label">Avg Score</div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('questions')">Questions</button>
      <button class="tab-btn" onclick="switchTab('results')">Results</button>
    </div>

    <div id="questions-tab" class="tab-content active">
      <div class="card">
        <div class="card-header">
          <i class="fas fa-plus"></i>
          <h3>Add / Edit Question</h3>
        </div>
        <div id="questionAlert" class="alert"></div>
        
        <form id="questionForm" onsubmit="saveQuestion(event)">
          <input type="hidden" id="question_id" />
          
          <div class="form-group full">
            <label>Question Text</label>
            <textarea id="question_titre" class="form-control" placeholder="Enter your question..."></textarea>
          </div>

          <div class="form-row">
            <div class="form-group" style="display: none;">
               <label>Level</label>
               <select id="question_niveau" class="form-control"><option value="Beginner">Beginner</option></select>
            </div>
            <div class="form-group">
               <label>Correct Answer</label>
               <select id="correct_option" class="form-control">
                 <option value="1">Option 1</option>
                 <option value="2">Option 2</option>
                 <option value="3">Option 3</option>
               </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Option 1</label>
              <input type="text" id="option1" class="form-control" placeholder="Answer 1">
            </div>
            <div class="form-group">
              <label>Option 2</label>
              <input type="text" id="option2" class="form-control" placeholder="Answer 2">
            </div>
          </div>
          <div class="form-group">
            <label>Option 3</label>
            <input type="text" id="option3" class="form-control" placeholder="Answer 3">
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Question</button>
            <button type="button" class="btn btn-secondary" onclick="resetQuestionForm()">Cancel</button>
          </div>
        </form>
      </div>

      <div class="card">
        <div class="card-header">
          <i class="fas fa-list"></i>
          <h3>Question List</h3>
        </div>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th width="50">ID</th>
                <th>Question</th>
                <th>Options</th>
                <th width="100">Actions</th>
              </tr>
            </thead>
            <tbody id="questionsTableBody">
               <tr><td colspan="4" style="text-align:center;">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="results-tab" class="tab-content">
      <div class="card">
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Score</th>
                <th>Total</th>
                <th>%</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="resultsTableBody">
               <tr><td colspan="6" style="text-align:center;">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      const API_BASE = "/test/Controller/api_admin.php";
      let questions = [], results = [];

      document.addEventListener("DOMContentLoaded", () => {
        loadQuestions(); loadResults(); updateStats();
      });

      function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById(tab + '-tab').classList.add('active');
      }

      async function updateStats() {
         try {
             const q = await (await fetch(`${API_BASE}?action=getQuestions`)).json();
             const r = await (await fetch(`${API_BASE}?action=getResults`)).json();
             document.getElementById('totalQuestions').textContent = q.length || 0;
             document.getElementById('totalResults').textContent = r.length || 0;
         } catch(e) { console.log(e); }
      }

      async function loadQuestions() {
         try {
             questions = await (await fetch(`${API_BASE}?action=getQuestions`)).json();
             renderQuestions();
         } catch(e) { console.error(e); }
      }

      async function loadResults() {
         try {
             results = await (await fetch(`${API_BASE}?action=getResults`)).json();
             renderResults();
         } catch(e) { console.error(e); }
      }

      async function renderQuestions() {
          const tbody = document.getElementById('questionsTableBody');
          if(!questions.length) { tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No questions.</td></tr>'; return; }
          
          const rows = await Promise.all(questions.map(async q => {
              const opts = await (await fetch(`${API_BASE}?action=getOptions&id_question=${q.id_reponse||q.id_question}`)).json();
              const optsHtml = opts.map(o => `<span class="option-tag ${o.is_correct==1?'correct':''}">${o.option_text}</span>`).join('');
              
              return `<tr>
                 <td>#${q.id_reponse||q.id_question}</td>
                 <td>${escapeHtml(q.question || q.titre || '')}</td>
                 <td>${optsHtml}</td>
                 <td>
                   <div style="display:flex; gap:5px;">
                     <button class="btn btn-sm btn-primary" onclick="editQ(${q.id_reponse||q.id_question})"><i class="fas fa-edit"></i></button>
                     <button class="btn btn-sm btn-danger" onclick="delQ(${q.id_reponse||q.id_question})"><i class="fas fa-trash"></i></button>
                   </div>
                 </td>
              </tr>`;
          }));
          tbody.innerHTML = rows.join('');
      }

      function renderResults() {
          const tbody = document.getElementById('resultsTableBody');
          if(!results.length) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No results.</td></tr>'; return; }
          tbody.innerHTML = results.map(r => `
             <tr>
               <td>#${r.id_result}</td>
               <td>${r.score}</td>
               <td>${r.total_questions}</td>
               <td>${Math.round(r.score/r.total_questions*100)}%</td>
               <td>${new Date(r.date_completion).toLocaleDateString()}</td>
               <td><button class="btn btn-sm btn-danger" onclick="delR(${r.id_result})"><i class="fas fa-trash"></i></button></td>
             </tr>
          `).join('');
      }

      async function saveQuestion(e) {
          e.preventDefault();
          const id = document.getElementById('question_id').value;
          const fd = new FormData();
          fd.append('action', id ? 'updateQuestion' : 'addQuestion');
          if(id) fd.append('id', id);
          fd.append('titre', document.getElementById('question_titre').value);
          fd.append('option1', document.getElementById('option1').value);
          fd.append('option2', document.getElementById('option2').value);
          fd.append('option3', document.getElementById('option3').value);
          fd.append('correct_option', document.getElementById('correct_option').value);
          
          const res = await (await fetch(API_BASE, {method:'POST', body:fd})).json();
          if(res.success) { 
             showAlert('questionAlert', 'success', 'Saved!'); 
             resetQuestionForm(); loadQuestions(); updateStats();
          } else {
             showAlert('questionAlert', 'error', 'Error saving');
          }
      }

      async function editQ(id) {
          const q = await (await fetch(`${API_BASE}?action=getQuestion&id=${id}`)).json();
          document.getElementById('question_id').value = q.id_reponse;
          document.getElementById('question_titre').value = q.question;
          document.getElementById('option1').value = q.option1;
          document.getElementById('option2').value = q.option2;
          document.getElementById('option3').value = q.option3;
          document.getElementById('correct_option').value = q.reponse_correcte;
          window.scrollTo({top:0, behavior:'smooth'});
      }

      async function delQ(id) {
          if(confirm('Delete question?')) {
             await fetch(API_BASE, {method:'POST', body: new URLSearchParams({action:'deleteQuestion', id})});
             loadQuestions();
          }
      }
      
      async function delR(id) {
          if(confirm('Delete result?')) {
             await fetch(API_BASE, {method:'POST', body: new URLSearchParams({action:'deleteResult', id})});
             loadResults();
          }
      }

      function resetQuestionForm() { document.getElementById('questionForm').reset(); document.getElementById('question_id').value = ''; }
      function showAlert(id, type, msg) { const el = document.getElementById(id); el.className=`alert alert-${type}`; el.innerHTML=msg; el.style.display='block'; setTimeout(()=>el.style.display='none', 3000); }
      function escapeHtml(text) { const div = document.createElement("div"); div.textContent = text; return div.innerHTML; }
    </script>
  </body>
</html>
