<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Management - Kaiadmin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" />
    <style>
      /* --- PASTE THE EXACT SAME CSS FROM modulequiz_admin.html HERE --- */
      /* For brevity, I am using the same classes. Ensure you copy the <style> block from the previous file if not using an external .css file */
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #e2e8f0; height: 100vh; display: flex; overflow: hidden; }
      .sidebar { width: 260px; background: #1a2035; border-right: 1px solid #334155; display: flex; flex-direction: column; flex-shrink: 0; }
      .sidebar-brand { height: 70px; display: flex; align-items: center; padding: 0 25px; font-size: 20px; font-weight: bold; color: #fff; border-bottom: 1px solid #334155; }
      .sidebar-brand i { color: #3b82f6; margin-right: 10px; font-size: 24px; }
      .nav-menu { list-style: none; padding: 20px 0; }
      .nav-item { margin-bottom: 5px; }
      .nav-link { display: flex; align-items: center; justify-content: space-between; padding: 12px 25px; color: #94a3b8; text-decoration: none; transition: 0.3s; font-size: 14px; border-left: 3px solid transparent; cursor: pointer; }
      .nav-link:hover { background: rgba(255, 255, 255, 0.05); color: #fff; }
      .nav-link.active { background: rgba(59, 130, 246, 0.1); color: #3b82f6; border-left-color: #3b82f6; }
      .nav-content { display: flex; align-items: center; gap: 10px; }
      .nav-content i { width: 20px; text-align: center; font-size: 16px; }
      .arrow { transition: transform 0.3s; font-size: 12px; }
      .nav-item.open .arrow { transform: rotate(180deg); }
      .nav-collapse { list-style: none; background: #141a2d; display: none; padding: 5px 0; }
      .nav-item.open .nav-collapse { display: block; }
      .sub-link { display: flex; align-items: center; padding: 10px 25px 10px 55px; color: #94a3b8; text-decoration: none; font-size: 13px; transition: 0.2s; }
      .sub-link:hover { color: #fff; }
      .sub-link.active { color: #3b82f6; font-weight: 500; }
      .main-content { flex-grow: 1; padding: 30px; overflow-y: auto; }
      .container { max-width: 100%; }
      .header { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 25px 30px; margin-bottom: 25px; }
      .header h1 { font-size: 24px; color: #f1f5f9; margin-bottom: 5px; }
      .header p { font-size: 14px; color: #94a3b8; }
      .card { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 25px; margin-bottom: 20px; }
      .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #334155; }
      .card-header i { color: #3b82f6; font-size: 18px; }
      .card-header h3 { font-size: 16px; font-weight: 600; color: #f1f5f9; }
      .form-group { margin-bottom: 15px; }
      .form-group label { display: block; font-size: 13px; font-weight: 500; color: #cbd5e1; margin-bottom: 6px; }
      .form-group label .required { color: #ef4444; }
      .form-control { width: 100%; padding: 10px 12px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; font-size: 14px; }
      .form-control:focus { outline: none; border-color: #3b82f6; }
      textarea.form-control { resize: vertical; min-height: 80px; font-family: inherit; }
      .form-actions { display: flex; gap: 10px; padding-top: 15px; border-top: 1px solid #334155; }
      .btn { padding: 10px 18px; border: none; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
      .btn-primary { background: #3b82f6; color: white; }
      .btn-secondary { background: #475569; color: #e2e8f0; }
      .btn-danger { background: #ef4444; color: white; }
      .btn-sm { padding: 6px 12px; font-size: 13px; }
      .table-container { overflow-x: auto; margin-top: 20px; }
      table { width: 100%; border-collapse: collapse; font-size: 14px; }
      thead { background: #0f172a; border-bottom: 2px solid #334155; }
      th { padding: 12px; text-align: left; font-weight: 600; color: #94a3b8; font-size: 12px; text-transform: uppercase; }
      td { padding: 12px; border-bottom: 1px solid #334155; color: #cbd5e1; }
      tbody tr:hover { background: #0f172a; }
      .badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
      .badge-success { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
      .badge-warning { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
      .alert { padding: 12px 16px; border-radius: 6px; margin-bottom: 20px; display: none; align-items: center; gap: 10px; font-size: 14px; }
      .alert-success { background: rgba(34, 197, 94, 0.1); border: 1px solid #22c55e; color: #22c55e; }
      .alert-error { background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; color: #ef4444; }
      .loading { display: inline-block; width: 16px; height: 16px; border: 2px solid #334155; border-radius: 50%; border-top-color: #3b82f6; animation: spin 0.6s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    

    <main class="main-content">
      <div class="container">
        <div class="header">
          <h1><i class="fas fa-table"></i> Management: Quiz Table</h1>
          <p>Create, Modify and Delete Quizzes</p>
        </div>

        <div class="card">
          <div class="card-header">
            <i class="fas fa-plus"></i>
            <h3>Add / Edit Quiz</h3>
          </div>
          <div id="formAlert" class="alert"></div>
          
          <form id="quizForm" onsubmit="saveQuiz(event)">
            <input type="hidden" id="id_quiz" />
            
            <div class="form-group">
              <label>Quiz Title <span class="required">*</span></label>
              <input type="text" id="titre" class="form-control" placeholder="Ex: Cybersecurity Basics" required />
            </div>

            <div class="form-group">
              <label>Description <span class="required">*</span></label>
              <textarea id="description" class="form-control" placeholder="Describe the quiz..." required></textarea>
            </div>

            <div class="form-group">
              <label>Status</label>
              <select id="statut" class="form-control">
                <option value="actif">Active</option>
                <option value="inactif">Inactive</option>
              </select>
            </div>

            <div class="form-actions">
              <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Quiz</button>
              <button type="button" class="btn btn-secondary" onclick="resetForm()"><i class="fas fa-times"></i> Cancel</button>
            </div>
          </form>
        </div>

        <div class="card">
          <div class="card-header">
            <i class="fas fa-list"></i>
            <h3>Quiz List</h3>
          </div>
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th width="50">ID</th>
                  <th>Title</th>
                  <th>Description</th>
                  <th>Created Date</th>
                  <th>Status</th>
                  <th width="150">Actions</th>
                </tr>
              </thead>
              <tbody id="tableBody">
                <tr><td colspan="6" style="text-align:center; padding:20px;">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <script>
      const API_BASE = "../../controller/api_admin.php";

      document.addEventListener("DOMContentLoaded", loadQuizzes);

      async function loadQuizzes() {
        try {
          const response = await fetch(`${API_BASE}?action=getQuizzes`);
          const quizzes = await response.json();
          const tbody = document.getElementById("tableBody");
          
          if (!quizzes || quizzes.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#64748b;">No quizzes found.</td></tr>`;
            return;
          }

          tbody.innerHTML = quizzes.map(q => `
            <tr>
              <td>#${q.id_quiz}</td>
              <td><strong>${escapeHtml(q.titre)}</strong></td>
              <td>${escapeHtml(q.description.substring(0, 50))}...</td>
              <td>${q.date_creation}</td>
              <td>
                <span class="badge ${q.statut === 'actif' ? 'badge-success' : 'badge-warning'}">
                  ${q.statut}
                </span>
              </td>
              <td>
                <div class="actions">
                  <button class="btn btn-sm btn-primary" onclick="editQuiz(${q.id_quiz})"><i class="fas fa-edit"></i></button>
                  <button class="btn btn-sm btn-danger" onclick="deleteQuiz(${q.id_quiz})"><i class="fas fa-trash"></i></button>
                </div>
              </td>
            </tr>
          `).join("");
        } catch (error) {
          console.error(error);
        }
      }

      async function saveQuiz(e) {
        e.preventDefault();
        const id = document.getElementById("id_quiz").value;
        const formData = new FormData();
        formData.append("action", id ? "updateQuiz" : "addQuiz");
        if(id) formData.append("id", id);
        formData.append("titre", document.getElementById("titre").value);
        formData.append("description", document.getElementById("description").value);
        formData.append("statut", document.getElementById("statut").value);

        try {
            const res = await fetch(API_BASE, { method: "POST", body: formData });
            const result = await res.json();
            if(result.success) {
                showAlert("formAlert", "success", id ? "Quiz Updated" : "Quiz Added");
                resetForm();
                loadQuizzes();
            } else {
                showAlert("formAlert", "error", "Error saving quiz");
            }
        } catch (err) {
            showAlert("formAlert", "error", err.message);
        }
      }

      async function editQuiz(id) {
          const res = await fetch(`${API_BASE}?action=getQuiz&id=${id}`);
          const quiz = await res.json();
          if(quiz.error) return;

          document.getElementById("id_quiz").value = quiz.id_quiz;
          document.getElementById("titre").value = quiz.titre;
          document.getElementById("description").value = quiz.description;
          document.getElementById("statut").value = quiz.statut;
          window.scrollTo({ top: 0, behavior: "smooth" });
          showAlert("formAlert", "success", "Editing quiz #" + id);
      }

      async function deleteQuiz(id) {
          if(!confirm("Delete this quiz?")) return;
          
          const formData = new FormData();
          formData.append("action", "deleteQuiz");
          formData.append("id", id);
          
          const res = await fetch(API_BASE, { method: "POST", body: formData });
          const result = await res.json();
          
          if(result.success) {
              loadQuizzes();
          } else {
              alert("Error deleting quiz");
          }
      }

      function resetForm() {
          document.getElementById("quizForm").reset();
          document.getElementById("id_quiz").value = "";
          document.getElementById("formAlert").style.display = "none";
      }

      function showAlert(id, type, msg) {
          const alert = document.getElementById(id);
          alert.className = `alert alert-${type}`;
          alert.innerHTML = msg;
          alert.style.display = "flex";
          setTimeout(() => alert.style.display = "none", 3000);
      }
      function escapeHtml(text) { const div = document.createElement("div"); div.textContent = text; return div.innerHTML; }
    </script>
  </body>
</html>
